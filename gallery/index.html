  <script>
    (function () {
      const images = (window.WAVER_CONFIG || {}).galleryImages || [];
      const grid = document.getElementById("gallery-full");
      if (!grid) return;
      grid.innerHTML = images.map((img) => `
        <figure class="gallery-page-item">
          <img src="${img.src}" alt="${img.alt || ""}" loading="lazy" onerror="this.style.display='none'">
          <figcaption>${img.caption || img.alt || ""}</figcaption>
        </figure>
      `).join("");
    })();

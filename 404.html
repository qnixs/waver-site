<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaverStore</title>
  <script>
    (function () {
      var redirects = {
        "/gallery.html": "/gallery/",
        "/download.html": "/download/",
        "/offer.html": "/offer/",
        "/thanks.html": "/thanks/",
        "/index.html": "/"
      };
      var path = location.pathname;
      if (redirects[path]) {
        location.replace(redirects[path] + location.search + location.hash);
      }
    })();
  </script>
</head>
<body>
  <p>Страница не найдена. <a href="/">На главную</a></p>
</body>
</html>
